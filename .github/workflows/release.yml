name: Release

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read latest version from CHANGELOG.md
        id: changelog
        run: |
          VERSION_LINE=$(grep -m1 -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md || true)
          if [ -z "$VERSION_LINE" ]; then
            echo "No released version section found in CHANGELOG.md, nothing to do."
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION=$(echo "$VERSION_LINE" | sed -E 's/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ ("\\[" ver "\\]")) { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md

          # Trim leading/trailing blank lines so the release body does not start or end empty.
          sed -i -e '/./,$!d' -e ':a' -e '/^\n*$/{$d;N;ba' -e '}' /tmp/release-notes.md

      - name: Check whether the tag already exists
        id: tag_check
        if: steps.changelog.outputs.version != ''
        run: |
          TAG="v${{ steps.changelog.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and GitHub release
        if: steps.changelog.outputs.version != '' && steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.changelog.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md
